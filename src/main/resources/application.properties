# =============================
# APP
# =============================
spring.application.name=nguyenhoangluan
server.port=8080
server.servlet.session.timeout=30m
spring.main.banner-mode=off

# =============================
# DATABASE MYSQL (LARAGON)
# =============================
spring.datasource.url=jdbc:mysql://localhost:3306/webbanhang?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================
# JPA / HIBERNATE
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# =============================
# THYMELEAF
# =============================
spring.thymeleaf.cache=false

# =============================
# FILE UPLOAD
# =============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================
# OPENAI API
# =============================
openai.api.key=sk-xxxxxxxxxxxxxxxxxxxxxxxx

# =============================
# CUSTOM SECURITY / ROLE
# =============================
app.security.default-role=USER
app.security.remember-me-key=nguyenhoangluan-secret-key

# =============================
# REWARD / POINT
# =============================
app.reward.redeem.enabled=true
app.reward.points-per-1000-vnd=1

# =============================
# SHIPPING
# =============================
app.shipping.standard-fee=30000
app.shipping.free-ship-min-total=1000000
app.shipping.free-ship-min-items=2

# =============================
# OTP CONFIG
# method:
# - app  : OTP xác minh n?i b? / authenticator
# - sms  : OTP qua s? ?i?n tho?i
# - email: ch? ?? d? phňng, không b?t bu?c app/sms
# =============================
app.otp.enabled=true
app.otp.method=app
app.otp.length=6
app.otp.expire-minutes=3
app.otp.max-attempts=5
app.otp.resend-wait-seconds=30

# =============================
# PAYMENT / VNPAY
# =============================
app.payment.default-method=COD
vnpay.tmn-code=AI2MGGWR
vnpay.hash-secret=HASH_SECRET_BAN_NHAN_DUOC_TRONG_EMAIL
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8080/payment/vnpay-return
vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.locale=vn
vnpay.order-type=other

# =============================
# SMS OTP (OPTIONAL - ch? khai báo khi lŕm OTP th?t b?ng SMS)
