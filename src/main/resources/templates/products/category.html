<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head(${category.name})}"></head>
<body>
<div th:replace="~{layout :: header}"></div>

<main class="page-shell">
    <section class="category-shell">
        <div class="section-header">
            <h1 th:text="${category.name}">Điện thoại</h1>
            <a th:if="${isAdmin}" th:href="@{/admin/products}">Quản lý sản phẩm</a>
        </div>

        <div class="category-grid">
            <article class="product-card" th:each="item : ${products}">
                <a th:href="@{/products/{id}(id=${item.id})}">
                    <div class="product-image">
                        <img th:src="@{/images/{file}(file=${item.image})}" th:alt="${item.name}">
                    </div>
                    <h3 th:text="${item.name}">Tên sản phẩm</h3>
                    <div class="price red" th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + 'đ'">0đ</div>
                    <div class="old-price" th:if="${item.originalPrice != null}">
                        <span th:text="${#numbers.formatDecimal(item.originalPrice,0,'COMMA',0,'POINT')} + 'đ'"></span>
                        <em th:if="${item.discountPercent > 0}" th:text="'-' + ${item.discountPercent} + '%'"></em>
                    </div>
                    <p class="desc" th:text="${item.shortDescription}"></p>
                </a>
                <form th:action="@{/cart/add/{id}(id=${item.id})}" method="post">
                    <input type="hidden" name="quantity" value="1">
                    <input type="hidden" th:name="redirectUrl" th:value="@{/products/category/{id}(id=${category.id})}">
                    <button class="buy-button" type="submit">Thêm vào giỏ</button>
                </form>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
