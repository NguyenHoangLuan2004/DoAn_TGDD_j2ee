<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Đặt hàng thành công')}"></head>
<body>
<div th:replace="~{layout :: header}"></div>

<main class="page-shell narrow-order">
    <section class="success-card">
        <div class="success-top">
            <div class="checkmark">✓</div>
            <h1>Đặt hàng thành công!</h1>
            <p>Cảm ơn bạn đã mua hàng. Đơn hàng của bạn đã được ghi nhận.</p>
            <div class="order-code">Mã đơn hàng: <strong th:text="${order.orderCode}"></strong></div>
        </div>

        <div class="order-table">
            <div class="table-head">
                <span>Sản phẩm</span>
                <span>SL</span>
                <span>Đơn giá</span>
                <span>Thành tiền</span>
            </div>
            <div class="table-row" th:each="item : ${order.items}">
                <span th:text="${item.productName}"></span>
                <span th:text="${item.quantity}"></span>
                <span th:text="${#numbers.formatDecimal(item.unitPrice,0,'COMMA',0,'POINT')} + 'đ'"></span>
                <span th:text="${#numbers.formatDecimal(item.lineTotal,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>
        </div>

        <div class="summary-total">
            <div><span>Tổng tiền</span><strong th:text="${#numbers.formatDecimal(order.grandTotal,0,'COMMA',0,'POINT')} + 'đ'"></strong></div>
            <div><span>Điểm tích lũy được cộng</span><strong th:text="${order.pointsEarned} + ' điểm'"></strong></div>
            <div><span>Quy đổi</span><strong>Mỗi 10.000đ = 1 điểm</strong></div>
        </div>

        <div class="success-actions">
            <a class="buy-button large" th:href="@{/}">Về trang chủ</a>
            <a class="secondary-button" th:href="@{/products/category/1}">Tiếp tục mua sắm</a>
        </div>
    </section>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
